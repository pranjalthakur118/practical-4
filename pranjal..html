<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>My Image Gallery</h1>
    <p>Hover over images to explore effects</p>
  </header>

  <section class="gallery">
    <div class="card">
      <img src="https://picsum.photos/300/200?1" alt="Image 1">
      <div class="overlay">Beautiful View</div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?2" alt="Image 2">
      <div class="overlay">Nature</div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?3" alt="Image 3">
      <div class="overlay">Mountains</div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?4" alt="Image 4">
      <div class="overlay">Ocean</div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?5" alt="Image 5">
      <div class="overlay">Sunset</div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?6" alt="Image 6">
      <div class="overlay">Forest</div>
    </div>
  </section>

</body>
</html>
